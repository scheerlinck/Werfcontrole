
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Werfcontrole Rapport</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
.topbar{background:#1B3A6B;color:#fff;padding:.75rem 1.25rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.topbar img{height:36px;width:auto;object-fit:contain}
.topbar h1{font-size:15px;font-weight:600;flex:1}
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer}
.btn-gr{background:#2A9D6A;color:#fff}
.btn-gr:hover{opacity:.88}
.btn-wh{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-wh:hover{background:rgba(255,255,255,.25)}
.container{max-width:780px;margin:0 auto;padding:1rem 1rem 6rem}
.card{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h2{font-size:18px;font-weight:700;color:#1B3A6B;margin-bottom:.25rem}
.card .meta{font-size:12px;color:#6b6b67;margin-top:4px}
.stats{display:flex;gap:10px;margin-top:1rem}
.stat{border:1px solid #e0ddd6;border-radius:8px;padding:.6rem 1rem;text-align:center;flex:1}
.stat-n{font-size:20px;font-weight:700}
.stat-n.op{color:#E8593C}.stat-n.dn{color:#2A9D6A}
.stat-l{font-size:10px;color:#6b6b67;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.group-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b6b67;padding:.5rem 0;border-bottom:1px solid #e0ddd6;margin-bottom:.75rem}
.item{background:#fff;border:1px solid #e0ddd6;border-left:3px solid #E8593C;border-radius:10px;padding:.9rem 1rem;margin-bottom:8px;transition:all .2s}
.item.done{border-left-color:#2A9D6A;opacity:.75}
.item-row{display:flex;align-items:flex-start;gap:10px}
.chk-box{width:26px;height:26px;border-radius:7px;border:2px solid #e0ddd6;background:#f5f4f0;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all .2s}
.chk-box.checked{background:#2A9D6A;border-color:#2A9D6A}
.chk-tick{display:none;width:8px;height:12px;border:2.5px solid #fff;border-top:none;border-left:none;transform:rotate(42deg) translate(0,-1px)}
.chk-box.checked .chk-tick{display:block}
.item-body{flex:1;min-width:0}
.item-title{font-size:14px;font-weight:500;margin-bottom:3px;word-break:break-word}
.item-title.done-title{text-decoration:line-through;color:#6b6b67}
.item-meta{font-size:11px;color:#6b6b67;line-height:1.6}
.item-photos{display:flex;flex-wrap:wrap;gap:5px;margin-top:.5rem}
.item-photo{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid #e0ddd6;cursor:zoom-in;transition:transform .1s}
.item-photo:hover{transform:scale(1.06)}
.nota-wrap{margin-top:.6rem}
.nota-label{font-size:11px;font-weight:600;color:#6b6b67;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.nota-input{width:100%;border:1px solid #e0ddd6;border-radius:7px;padding:6px 10px;font-family:inherit;font-size:13px;background:#f9f8f5;color:#1a1a18;outline:none;resize:vertical;min-height:52px}
.nota-input:focus{border-color:#1B3A6B}
.bottombar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0ddd6;padding:.75rem 1rem;display:flex;align-items:center;gap:10px;box-shadow:0 -2px 8px rgba(0,0,0,.08);z-index:100}
.counter{font-size:13px;color:#6b6b67;flex:1}
.loading{text-align:center;padding:3rem 1rem;color:#6b6b67}
.loading-icon{font-size:36px;margin-bottom:.5rem}
.error-box{background:#FDE8E3;border-radius:10px;padding:1rem;color:#9B3B28;font-size:13px;text-align:center;margin:1rem}
.lbx{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;align-items:center;justify-content:center;cursor:zoom-out}
.lbx.on{display:flex}
.lbx img{max-width:92vw;max-height:92vh;border-radius:8px}
.success-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:998;align-items:center;justify-content:center}
.success-overlay.on{display:flex}
.success-card{background:#fff;border-radius:16px;padding:2rem;text-align:center;max-width:320px;margin:1rem}
.success-icon{font-size:48px;margin-bottom:.75rem}
.success-title{font-size:18px;font-weight:700;color:#2A9D6A;margin-bottom:.5rem}
.success-text{font-size:13px;color:#6b6b67;line-height:1.6}
@media print{.topbar,.bottombar,.nota-wrap,.lbx{display:none!important}body{background:#fff}@page{margin:1.5cm}}
</style>
</head>

  <h1 id="rapport-titel">Werfcontrole rapport</h1>
  <button class="btn btn-wh" onclick="window.print()">&#128424; Print</button>
</div>

<div class="container">
  <div id="loading" class="loading">
    <div class="loading-icon">&#128203;</div>
    <div>Rapport laden...</div>
  </div>
  <div id="content" style="display:none"></div>
  <div id="error" class="error-box" style="display:none">Rapport niet gevonden. Controleer de link.</div>
</div>

<div class="bottombar" id="bottombar" style="display:none">
  <div class="counter" id="counter">0 van 0 afgewerkt</div>
  <button class="btn btn-gr" id="btn-verstuur" onclick="verstuur()">&#10003; Versturen naar projectleider</button>
</div>

<div class="lbx" id="lbx" onclick="this.classList.remove('on')">
  <img id="lbx-img" src="">
</div>

<div class="success-overlay" id="success">
  <div class="success-card">
    <div class="success-icon">&#10003;</div>
    <div class="success-title">Verstuurd!</div>
    <div class="success-text">Uw feedback is doorgestuurd naar de projectleider. U kunt deze pagina nu sluiten.</div>
  </div>
</div>

<script>
var rapportData = null;
var API_URL = '';
var itemStates = {};

function getParam(name) {
  var match = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
  return match ? decodeURIComponent(match[1]) : '';
}

function init() {
  var rapportId = getParam('id');
  API_URL = getParam('api') || '';

  if (!rapportId) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    return;
  }

  // Als geen API URL in params, probeer uit localStorage
  if (!API_URL) {
    try { API_URL = localStorage.getItem('werf_api_url') || ''; } catch(e) {}
  }
  if (!API_URL) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').innerHTML = 'Geen API verbinding. Open de link opnieuw via de app.';
    document.getElementById('error').style.display = 'block';
    return;
  }
  fetch(API_URL + '?action=getRapport&rapportId=' + encodeURIComponent(rapportId))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.ok || !data.rapport) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        return;
      }
      rapportData = data.rapport;
      // Haal API URL op uit rapport data als die niet in URL staat
      if (!API_URL && rapportData.apiUrl) {
        API_URL = rapportData.apiUrl;
      }
      renderRapport();
    })
    .catch(function() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    });
}

function renderRapport() {
  var r = rapportData;
  document.title = 'Werfcontrole - ' + r.projectNaam;
  document.getElementById('rapport-titel').textContent = r.projectNaam + (r.aannemer && r.aannemer !== 'Alle aannemers' ? ' – ' + r.aannemer : '');
  document.getElementById('loading').style.display = 'none';
  document.getElementById('bottombar').style.display = 'flex';

  var items = r.items || [];
  items.forEach(function(item) { itemStates[item.id] = { gedaan: item.done || false, notitie: '' }; });

  var html = '<div class="card">';
  html += '<h2>' + esc(r.projectNaam) + '</h2>';
  html += '<div class="meta">' + (r.projectAdres ? esc(r.projectAdres) + ' &middot; ' : '') + esc(r.datum) + '</div>';
  var nOpen = items.filter(function(i){ return !i.done; }).length;
  var nDone = items.filter(function(i){ return i.done; }).length;
  html += '<div class="stats">';
  html += '<div class="stat"><div class="stat-n op" id="s-op">' + nOpen + '</div><div class="stat-l">Open</div></div>';
  html += '<div class="stat"><div class="stat-n dn" id="s-dn">' + nDone + '</div><div class="stat-l">Afgewerkt</div></div>';
  html += '</div></div>';

  // Groepeer per locatie
  var groups = {};
  items.forEach(function(item) {
    var k = item.locatie || 'Algemeen';
    if (!groups[k]) groups[k] = [];
    groups[k].push(item);
  });

  Object.keys(groups).forEach(function(loc) {
    html += '<div class="group-title">&#128205; ' + esc(loc) + '</div>';
    groups[loc].forEach(function(item) {
      var photos = '';
      if (r.showFoto && item.photos && item.photos.length) {
        photos = '<div class="item-photos">';
        item.photos.forEach(function(src) {
          photos += '<img class="item-photo" src="' + src + '" onclick="openLB(this.src)">';
        });
        photos += '</div>';
      }
      html += '<div class="item" id="wrap-' + item.id + '">';
      html += '<div class="item-row">';
      html += '<div class="chk-box" id="chk-' + item.id + '" onclick="toggle(\'' + item.id + '\')">';
      html += '<div class="chk-tick"></div></div>';
      html += '<div class="item-body">';
      html += '<div class="item-title" id="title-' + item.id + '">' + esc(item.omschrijving) + '</div>';
      var meta = [];
      if (item.aannemer) meta.push(esc(item.aannemer));
      if (item.datum) meta.push(item.datum);
      if (meta.length) html += '<div class="item-meta">' + meta.join(' &middot; ') + '</div>';
      html += '</div></div>';
      html += photos;
      html += '<div class="nota-wrap">';
      html += '<div class="nota-label">&#128221; Notitie / opmerking</div>';
      html += '<textarea class="nota-input" id="nota-' + item.id + '" placeholder="Voeg een opmerking toe..." oninput="saveNota(\'' + item.id + '\',this.value)"></textarea>';
      html += '</div></div>';
    });
  });

  document.getElementById('content').innerHTML = html;
  document.getElementById('content').style.display = 'block';
  updateCounter();
}

function toggle(id) {
  itemStates[id].gedaan = !itemStates[id].gedaan;
  var done = itemStates[id].gedaan;
  var chk = document.getElementById('chk-' + id);
  var wrap = document.getElementById('wrap-' + id);
  var title = document.getElementById('title-' + id);
  chk.classList.toggle('checked', done);
  wrap.classList.toggle('done', done);
  if (title) { title.classList.toggle('done-title', done); }
  updateCounter();
}

function saveNota(id, val) {
  itemStates[id].notitie = val;
}

function updateCounter() {
  var tot = Object.keys(itemStates).length;
  var dn = Object.values(itemStates).filter(function(s){ return s.gedaan; }).length;
  document.getElementById('counter').textContent = dn + ' van ' + tot + ' afgewerkt';
  var sop = document.getElementById('s-op');
  var sdn = document.getElementById('s-dn');
  if (sop) sop.textContent = tot - dn;
  if (sdn) sdn.textContent = dn;
}

function openLB(src) {
  document.getElementById('lbx-img').src = src;
  document.getElementById('lbx').classList.add('on');
}

function verstuur() {
  if (!rapportData || !API_URL) return;
  var btn = document.getElementById('btn-verstuur');
  btn.disabled = true;
  btn.textContent = 'Versturen...';

  var feedbackItems = Object.keys(itemStates).map(function(id) {
    return { id: id, gedaan: itemStates[id].gedaan, notitie: itemStates[id].notitie };
  });

  var rapportId = getParam('id');

  fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'saveFeedback',
      rapportId: rapportId,
      aannemer: rapportData.aannemer || '',
      items: feedbackItems
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok) {
      document.getElementById('success').classList.add('on');
      document.getElementById('bottombar').style.display = 'none';
    } else {
      btn.disabled = false;
      btn.textContent = '✓ Versturen naar projectleider';
      alert('Fout bij versturen. Probeer opnieuw.');
    }
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = '✓ Versturen naar projectleider';
    alert('Geen verbinding. Probeer opnieuw.');
  });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
